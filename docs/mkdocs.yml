site_name: Productive K3S Infra
site_description: Infrastructure runtime engine and packaged profile execution for Productive K3S Core, with bilingual documentation.
site_author: Productive K3S Infra
site_url: https://infra.productive-k3s.io/
repo_url: https://github.com/jemacchi/productive-k3s-infra
repo_name: GitHub
edit_uri: edit/main/docs/src/
docs_dir: src
site_dir: site

theme:
  name: material
  custom_dir: src/overrides
  language: en
  favicon: assets/images/favicon.ico
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
  font: false
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - English:
      - Home: en/index.md
      - Product:
          - en/product/index.md
          - How to use: en/product/how-to-use.md
          - Reasons behind: en/product/reasons-behind.md
          - Open vs Pro: en/product/open-vs-pro.md
          - Relationship with Productive K3S Core: en/product/productive-k3s-relationship.md
      - User docs:
          - en/user-docs/index.md
          - Make targets: en/user-docs/make-targets.md
          - Privacy and telemetry: en/user-docs/privacy-and-telemetry.md
      - Developer docs:
          - en/developer-docs/index.md
          - Guides:
              - en/developer-docs/guides/index.md
              - Project layout: en/developer-docs/guides/project-layout.md
              - TGZ package architecture: en/developer-docs/guides/tgz-package-architecture.md
              - Testing and matrix: en/developer-docs/guides/testing-and-matrix.md
              - CI/CD flow: en/developer-docs/guides/github-actions-and-cicd.md
              - Documentation workflow: en/developer-docs/guides/documentation-workflow.md
  - Español:
      - Inicio: es/index.md
      - Producto:
          - es/product/index.md
          - Cómo usar: es/product/how-to-use.md
          - Razones del diseño: es/product/reasons-behind.md
          - Open vs Pro: es/product/open-vs-pro.md
          - Relación con Productive K3S Core: es/product/productive-k3s-relationship.md
      - Documentación para usuarios:
          - es/user-docs/index.md
          - Targets de Make: es/user-docs/make-targets.md
          - Privacidad y telemetría: es/user-docs/privacy-and-telemetry.md
      - Documentación para desarrolladores:
          - es/developer-docs/index.md
          - Guías:
              - es/developer-docs/guides/index.md
              - Organización del proyecto: es/developer-docs/guides/project-layout.md
              - Arquitectura de paquetes TGZ: es/developer-docs/guides/tgz-package-architecture.md
              - Tests y matriz: es/developer-docs/guides/testing-and-matrix.md
              - Flujo de CI/CD: es/developer-docs/guides/github-actions-and-cicd.md
              - Flujo de documentación: es/developer-docs/guides/documentation-workflow.md

extra:
  pk3s:
    footer_slogan_en: "Pre-assembled infrastructure paths for Productive K3S Core, from local validation to reusable public deployment scenarios."
    footer_slogan_es: "Caminos de infraestructura prearmados para Productive K3S Core, desde validacion local hasta escenarios publicos de despliegue reutilizables."
    contact_label_en: "Contact"
    contact_label_es: "Contacto"
    newsletter_label_en: "Newsletter"
    newsletter_label_es: "Newsletter"
    newsletter_placeholder_en: "E-mail"
    newsletter_placeholder_es: "E-mail"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jemacchi/productive-k3s-infra
